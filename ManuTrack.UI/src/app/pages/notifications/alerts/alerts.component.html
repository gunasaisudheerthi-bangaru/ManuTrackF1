<div class="page-container">
  <div class="page-header">
    <h4 class="page-title">
      <i class="bi bi-bell me-2"></i>Alerts
      <span *ngIf="unreadCount > 0" class="badge bg-danger ms-2">{{ unreadCount }}</span>
    </h4>
    <button class="btn btn-sm btn-outline-secondary" (click)="markAllRead()" [disabled]="unreadCount === 0">
      <i class="bi bi-check-all me-1"></i>Mark All Read
    </button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger py-2">{{ errorMessage }}</div>

  <!-- Filters -->
  <div class="card mb-3">
    <div class="card-body py-2">
      <div class="d-flex gap-3 align-items-center flex-wrap">
        <div class="d-flex gap-2">
          <button class="btn btn-sm" [ngClass]="filterCategory === '' ? 'btn-dark' : 'btn-outline-secondary'"
            (click)="filterCategory = ''">All</button>
          <button *ngFor="let cat of categories" class="btn btn-sm"
            [ngClass]="filterCategory === cat ? 'btn-dark' : 'btn-outline-secondary'"
            (click)="filterCategory = cat">{{ cat }}</button>
        </div>
        <div class="form-check ms-2">
          <input class="form-check-input" type="checkbox" id="unreadOnly" [(ngModel)]="showUnreadOnly" />
          <label class="form-check-label" for="unreadOnly">Unread only</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Notifications -->
  <div *ngIf="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>

  <div *ngIf="!loading" class="card">
    <div class="list-group list-group-flush">
      <div *ngFor="let n of filteredNotifications"
        class="list-group-item list-group-item-action py-3"
        [ngClass]="{'bg-light': n.status === 'Unread'}"
        (click)="markRead(n)" style="cursor:pointer">
        <div class="d-flex gap-3 align-items-start">
          <div class="mt-1">
            <span class="badge {{ getCategoryClass(n.category) }}">{{ n.category }}</span>
          </div>
          <div class="flex-grow-1">
            <div class="d-flex justify-content-between align-items-start">
              <span class="fw-semibold" [ngClass]="{'fw-bold': n.status === 'Unread'}">{{ n.title }}</span>
              <small class="text-muted ms-2" style="white-space:nowrap">
                {{ n.createdDate | date:'MMM d, HH:mm' }}
              </small>
            </div>
            <p class="mb-0 text-muted small mt-1">{{ n.message }}</p>
          </div>
          <div>
            <span *ngIf="n.status === 'Unread'" class="badge bg-primary rounded-pill">New</span>
            <i *ngIf="n.status === 'Read'" class="bi bi-check2 text-muted"></i>
          </div>
        </div>
      </div>

      <div *ngIf="filteredNotifications.length === 0" class="list-group-item text-center text-muted py-5">
        <i class="bi bi-bell-slash" style="font-size:2rem"></i>
        <p class="mt-2 mb-0">No notifications found.</p>
      </div>
    </div>
  </div>
</div>
