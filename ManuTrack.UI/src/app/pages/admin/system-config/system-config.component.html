<div class="page-container">
  <div class="page-header">
    <h4 class="page-title"><i class="bi bi-sliders me-2"></i>System Configuration</h4>
  </div>

  <div class="row g-3">
    <div class="col-md-6" *ngFor="let group of groups">
      <div class="card h-100">
        <div class="card-header fw-semibold">
          <i class="bi bi-gear me-2"></i>{{ group }}
        </div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <tbody>
              <tr *ngFor="let config of getConfigsByGroup(group)">
                <td class="fw-semibold ps-3" style="width:55%">{{ config.key }}</td>
                <td>
                  <ng-container *ngIf="editingKey !== config.key">
                    <span class="badge bg-light text-dark border">{{ config.value }}</span>
                  </ng-container>
                  <ng-container *ngIf="editingKey === config.key">
                    <input type="text" class="form-control form-control-sm d-inline-block" style="width:120px"
                      [(ngModel)]="editValue" />
                  </ng-container>
                </td>
                <td class="text-end pe-3">
                  <ng-container *ngIf="editingKey !== config.key">
                    <button class="btn btn-sm btn-outline-primary" (click)="startEdit(config)">
                      <i class="bi bi-pencil"></i>
                    </button>
                  </ng-container>
                  <ng-container *ngIf="editingKey === config.key">
                    <button class="btn btn-sm btn-success me-1" (click)="saveEdit(config)">
                      <i class="bi bi-check-lg"></i>
                    </button>
                    <button class="btn btn-sm btn-secondary" (click)="cancelEdit()">
                      <i class="bi bi-x-lg"></i>
                    </button>
                  </ng-container>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
