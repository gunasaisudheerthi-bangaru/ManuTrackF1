<div class="page-container">
  <div class="page-header">
    <h4 class="page-title"><i class="bi bi-exclamation-triangle me-2"></i>Report Issue</h4>
  </div>

  <div *ngIf="successMessage" class="alert alert-success py-2">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="alert alert-danger py-2">{{ errorMessage }}</div>
  <div *ngIf="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>

  <div *ngIf="!loading" class="row g-3 justify-content-center">
    <div class="col-md-8">
      <div class="card">
        <div class="card-header fw-semibold">Issue Report Form</div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Related Work Order <span class="text-danger">*</span></label>
            <select class="form-select" [(ngModel)]="form.workOrderID">
              <option [ngValue]="0">Select work order</option>
              <option *ngFor="let wo of workOrders" [ngValue]="wo.workOrderID">
                #{{ wo.workOrderID }} — {{ wo.productName }} ({{ wo.status }})
              </option>
            </select>
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Issue Type <span class="text-danger">*</span></label>
              <select class="form-select" [(ngModel)]="form.issueType">
                <option value="">Select type</option>
                <option *ngFor="let t of issueTypes" [value]="t">{{ t }}</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Severity</label>
              <div class="d-flex gap-2 mt-1">
                <button *ngFor="let s of severities" class="btn btn-sm flex-fill"
                  [ngClass]="form.severity === s ? 'btn-dark' : 'btn-outline-secondary'"
                  (click)="form.severity = s">
                  {{ s }}
                </button>
              </div>
            </div>
          </div>

          <div class="mb-3 mt-3">
            <label class="form-label fw-semibold">Description <span class="text-danger">*</span></label>
            <textarea class="form-control" rows="4" [(ngModel)]="form.description"
              placeholder="Describe the issue in detail..."></textarea>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Suggested Action</label>
            <textarea class="form-control" rows="2" [(ngModel)]="form.suggestedAction"
              placeholder="Optional: suggest a corrective action..."></textarea>
          </div>

          <div class="alert alert-warning py-2 small mb-3">
            <i class="bi bi-info-circle me-1"></i>
            Submitting this form will set the work order to OnHold and notify your supervisor.
          </div>

          <button class="btn btn-danger w-100" (click)="submit()" [disabled]="submitting">
            <span *ngIf="submitting" class="spinner-border spinner-border-sm me-2"></span>
            <i *ngIf="!submitting" class="bi bi-send me-2"></i>
            {{ submitting ? 'Submitting...' : 'Submit Issue Report' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
