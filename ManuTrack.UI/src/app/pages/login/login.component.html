<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card p-4" style="width: 400px;">
    <div class="text-center mb-4">
      <i class="bi bi-gear-wide-connected text-primary" style="font-size: 2.5rem;"></i>
      <h4 class="mt-2 fw-bold">ManuTrack</h4>
      <p class="text-muted small">Manufacturing Operations Platform</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger py-2 small">{{ errorMessage }}</div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>
      <input type="email" class="form-control" [(ngModel)]="email" placeholder="Enter your email" />
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" class="form-control" [(ngModel)]="password" placeholder="Enter your password" (keyup.enter)="login()" />
    </div>

    <button class="btn btn-primary w-100" (click)="login()" [disabled]="loading">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>
  </div>
</div>
