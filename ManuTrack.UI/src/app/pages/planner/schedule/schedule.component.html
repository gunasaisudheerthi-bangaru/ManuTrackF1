<div class="page-container">
  <div class="page-header">
    <h4 class="page-title"><i class="bi bi-calendar3 me-2"></i>Production Schedule</h4>
    <div class="d-flex align-items-center gap-2">
      <button class="btn btn-sm btn-outline-secondary" (click)="prevWeek()">
        <i class="bi bi-chevron-left"></i>
      </button>
      <span class="fw-semibold">
        {{ currentWeekStart | date:'MMM d' }} — {{ weekDays[6] | date:'MMM d, y' }}
      </span>
      <button class="btn btn-sm btn-outline-secondary" (click)="nextWeek()">
        <i class="bi bi-chevron-right"></i>
      </button>
    </div>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger py-2">{{ errorMessage }}</div>
  <div *ngIf="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>

  <div *ngIf="!loading" class="row g-2">
    <div class="col" *ngFor="let day of weekDays">
      <div class="card h-100" [ngClass]="{'border-primary': isToday(day)}">
        <div class="card-header py-2 text-center" [ngClass]="isToday(day) ? 'bg-primary text-white' : 'bg-light'">
          <div class="fw-semibold small">{{ day | date:'EEE' }}</div>
          <div class="fs-5 fw-bold">{{ day | date:'d' }}</div>
        </div>
        <div class="card-body p-2">
          <ng-container *ngIf="getOrdersForDay(day).length > 0; else emptyDay">
            <div *ngFor="let wo of getOrdersForDay(day)"
              class="mb-1 p-1 rounded border-start border-3 bg-light small"
              [ngClass]="'border-' + (wo.status === 'InProgress' ? 'primary' : wo.status === 'Completed' ? 'success' : 'secondary')">
              <div class="fw-semibold">{{ wo.productName }}</div>
              <div class="small text-muted">WO #{{ wo.workOrderID }}</div>
              <span class="badge {{ getStatusClass(wo.status) }} mt-1">{{ wo.status }}</span>
            </div>
          </ng-container>
          <ng-template #emptyDay>
            <div class="text-muted text-center small py-2">—</div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>
