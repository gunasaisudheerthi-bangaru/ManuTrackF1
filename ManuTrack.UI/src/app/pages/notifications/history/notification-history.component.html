<div class="page-container">
  <div class="page-header">
    <h4 class="page-title"><i class="bi bi-clock-history me-2"></i>Notification History</h4>
    <button *ngIf="isAdmin" class="btn btn-primary btn-sm" (click)="showSendForm = !showSendForm">
      <i class="bi bi-send me-1"></i>Send Notification
    </button>
  </div>

  <div *ngIf="successMessage" class="alert alert-success py-2">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="alert alert-danger py-2">{{ errorMessage }}</div>

  <!-- Send Form (Admin only) -->
  <div *ngIf="showSendForm" class="card mb-3">
    <div class="card-header fw-semibold">Send Notification</div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">User ID</label>
          <input type="text" class="form-control" [(ngModel)]="sendForm.userID" placeholder="Target user ID" />
        </div>
        <div class="col-md-4">
          <label class="form-label">Category</label>
          <select class="form-select" [(ngModel)]="sendForm.category">
            <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Title</label>
          <input type="text" class="form-control" [(ngModel)]="sendForm.title" />
        </div>
        <div class="col-12">
          <label class="form-label">Message</label>
          <textarea class="form-control" rows="2" [(ngModel)]="sendForm.message"></textarea>
        </div>
      </div>
      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-primary" (click)="send()">Send</button>
        <button class="btn btn-secondary" (click)="showSendForm = false">Cancel</button>
      </div>
    </div>
  </div>

  <!-- History Table -->
  <div class="card">
    <div class="card-body p-0">
      <div *ngIf="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
      <table *ngIf="!loading" class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Title</th><th>Category</th><th>Message</th><th>Status</th><th>Received</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let n of notifications" [ngClass]="{'table-light': n.status === 'Unread'}">
            <td class="fw-semibold">{{ n.title }}</td>
            <td><span class="badge {{ getCategoryClass(n.category) }}">{{ n.category }}</span></td>
            <td class="text-muted small" style="max-width:300px">{{ n.message }}</td>
            <td>
              <span class="badge" [ngClass]="n.status === 'Read' ? 'bg-success' : 'bg-secondary'">
                {{ n.status }}
              </span>
            </td>
            <td class="text-muted small">{{ n.createdDate | date:'MMM d, y HH:mm' }}</td>
          </tr>
          <tr *ngIf="notifications.length === 0">
            <td colspan="5" class="text-center text-muted py-4">No notification history.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
