services:

  # ─── Angular Frontend ───────────────────────────────────────────
  manutrack-ui:
    build:
      context: ./ManuTrack.UI
      dockerfile: Dockerfile
    container_name: manutrack-ui
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    networks:
      - manutrack-net
    restart: on-failure

  # ─── API Gateway (Ocelot) ────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: api-gateway
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      auth-service:
        condition: service_started
      workorder-service:
        condition: service_started
      inventory-service:
        condition: service_started
      product-service:
        condition: service_started
      analytics-service:
        condition: service_started
      quality-service:
        condition: service_started
      compliance-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - manutrack-net
    restart: on-failure

  # ─── Auth Service ────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: AuthService/Dockerfile
    container_name: auth-service
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__GovernanceDb=Server=sqlserver,1433;Database=ManuTrackGovernanceDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=60
      - ServiceUrls__ComplianceService=http://compliance-service:8080
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - manutrack-net
    restart: on-failure

  # ─── WorkOrder Service ───────────────────────────────────────────
  workorder-service:
    build:
      context: .
      dockerfile: WorkOrderService/Dockerfile
    container_name: workorder-service
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__OperationsDb=Server=sqlserver,1433;Database=ManuTrackOperationsDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=60
      - ServiceUrls__ComplianceService=http://compliance-service:8080
      - ServiceUrls__NotificationService=http://notification-service:8080
      - ServiceUrls__QualityService=http://quality-service:8080
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - manutrack-net
    restart: on-failure

  # ─── Inventory Service ───────────────────────────────────────────
  inventory-service:
    build:
      context: .
      dockerfile: InventoryService/Dockerfile
    container_name: inventory-service
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__OperationsDb=Server=sqlserver,1433;Database=ManuTrackOperationsDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=60
      - ServiceUrls__ComplianceService=http://compliance-service:8080
      - ServiceUrls__NotificationService=http://notification-service:8080
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - manutrack-net
    restart: on-failure

  # ─── Product Service ─────────────────────────────────────────────
  product-service:
    build:
      context: .
      dockerfile: ProductService/Dockerfile
    container_name: product-service
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__OperationsDb=Server=sqlserver,1433;Database=ManuTrackOperationsDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=60
      - ServiceUrls__ComplianceService=http://compliance-service:8080
      - ServiceUrls__InventoryService=http://inventory-service:8080
      - ServiceUrls__NotificationService=http://notification-service:8080
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - manutrack-net
    restart: on-failure

  # ─── Analytics Service ───────────────────────────────────────────
  analytics-service:
    build:
      context: .
      dockerfile: AnalyticsService/Dockerfile
    container_name: analytics-service
    ports:
      - "5005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__QualityDb=Server=sqlserver,1433;Database=ManuTrackQualityDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=60
      - ServiceUrls__ComplianceService=http://compliance-service:8080
      - ServiceUrls__WorkOrderService=http://workorder-service:8080
      - ServiceUrls__InventoryService=http://inventory-service:8080
      - ServiceUrls__QualityService=http://quality-service:8080
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - manutrack-net
    restart: on-failure

  # ─── Quality Service ─────────────────────────────────────────────
  quality-service:
    build:
      context: .
      dockerfile: QualityService/Dockerfile
    container_name: quality-service
    ports:
      - "5006:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__QualityDb=Server=sqlserver,1433;Database=ManuTrackQualityDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=60
      - ServiceUrls__ComplianceService=http://compliance-service:8080
      - ServiceUrls__NotificationService=http://notification-service:8080
      - ServiceUrls__WorkOrderService=http://workorder-service:8080
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - manutrack-net
    restart: on-failure

  # ─── Compliance Service ──────────────────────────────────────────
  compliance-service:
    build:
      context: .
      dockerfile: ComplianceService/Dockerfile
    container_name: compliance-service
    ports:
      - "5007:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__QualityDb=Server=sqlserver,1433;Database=ManuTrackQualityDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=60
      - ConnectionStrings__GovernanceDb=Server=sqlserver,1433;Database=ManuTrackGovernanceDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=60
      - ServiceUrls__NotificationService=http://notification-service:8080
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - manutrack-net
    restart: on-failure

  # ─── Notification Service ────────────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    container_name: notification-service
    ports:
      - "5008:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__GovernanceDb=Server=sqlserver,1433;Database=ManuTrackGovernanceDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Connect Timeout=60
      - ServiceUrls__ComplianceService=http://compliance-service:8080
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - manutrack-net
    restart: on-failure

  # ─── SQL Server ──────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - manutrack-net
    # Health check — wait until SQL Server is actually ready to accept connections
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost,1433 -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1' -C -b"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

# ─── Volumes ─────────────────────────────────────────────────────
volumes:
  sqlserver-data:

# ─── Networks ────────────────────────────────────────────────────
networks:
  manutrack-net:
    driver: bridge
