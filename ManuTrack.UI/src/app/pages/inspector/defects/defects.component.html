<div class="page-container">
  <div class="page-header">
    <h4 class="page-title"><i class="bi bi-bug me-2"></i>Defects</h4>
    <button class="btn btn-primary btn-sm" (click)="showForm = !showForm">
      <i class="bi bi-plus-lg me-1"></i>Log Defect
    </button>
  </div>

  <div *ngIf="successMessage" class="alert alert-success py-2">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="alert alert-danger py-2">{{ errorMessage }}</div>

  <!-- Form -->
  <div *ngIf="showForm" class="card mb-3">
    <div class="card-header fw-semibold">Log New Defect</div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Inspection ID</label>
          <input type="number" class="form-control" [(ngModel)]="form.inspectionID" placeholder="Inspection ID" min="1" />
        </div>
        <div class="col-md-4">
          <label class="form-label">Severity</label>
          <select class="form-select" [(ngModel)]="form.severity">
            <option *ngFor="let s of severities" [value]="s">{{ s }}</option>
          </select>
        </div>
        <div class="col-md-4">
          <!-- spacer -->
        </div>
        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea class="form-control" rows="2" [(ngModel)]="form.description"></textarea>
        </div>
      </div>
      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-danger" (click)="save()">Log Defect</button>
        <button class="btn btn-secondary" (click)="showForm = false">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="card-body p-0">
      <div *ngIf="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
      <table *ngIf="!loading" class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th><th>Inspection ID</th><th>Severity</th>
            <th>Status</th><th>Description</th><th>Resolution</th><th>Logged</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let d of defects">
            <td class="fw-semibold">#{{ d.defectID }}</td>
            <td>#{{ d.inspectionID }}</td>
            <td><span class="badge {{ getSeverityClass(d.severity) }}">{{ d.severity }}</span></td>
            <td><span class="badge {{ getStatusClass(d.status) }}">{{ d.status }}</span></td>
            <td class="text-muted small" style="max-width:200px">{{ d.description }}</td>
            <td class="text-muted small">{{ d.resolution || '—' }}</td>
            <td class="text-muted small">{{ d.createdDate | date:'MMM d, y' }}</td>
          </tr>
          <tr *ngIf="defects.length === 0">
            <td colspan="7" class="text-center text-muted py-4">No defects logged.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
